<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MARIA-EduVault Global — AI-Powered Education Platform</title>
 
  !-- Favicon -->
<link rel="icon" type="image/webp" sizes="16x16" href="https://ik.imagekit.io/s95tumxuk/IMG_1167.png">
<link rel="icon" type="image/webp" sizes="32x32" href="https://ik.imagekit.io/s95tumxuk/IMG_1167.png">
<link rel="icon" type="image/webp" sizes="96x96" href="https://ik.imagekit.io/s95tumxuk/IMG_1167.png">
<link rel="apple-touch-icon" sizes="180x180" href="https://ik.imagekit.io/s95tumxuk/IMG_1167.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<!-- Firebase App (Core) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<!-- Firebase Auth -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<!-- Firebase Firestore -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<!-- Firebase Storage -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<!-- Firebase Analytics (optional — removes console warning) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics-compat.js"></script>

<!-- Your app.js MUST come AFTER all Firebase scripts -->

  <!-- Auth Screen -->
  <div id="authScreen">
    <div class="auth-bg-orbs">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
    </div>
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-icon-lg">M</div>
        <div class="logo-text-lg">MARIA <span>EduVault</span> </div>
      </div>
      <p class="auth-subtitle">AI-Powered Education for Everyone</p>

      <div id="authForms">
        <!-- Login Form -->
        <div id="loginForm">
          <div class="auth-field">
            <label>Email Address</label>
            <input type="email" id="loginEmail" placeholder="you@example.com">
          </div>
          <div class="auth-field">
            <label>Password</label>
            <input type="password" id="loginPass" placeholder="Your password">
          </div>
          <button class="auth-btn-primary" onclick="handleLogin()">
            <i class="fas fa-sign-in-alt"></i> Sign In
          </button>
          <div class="auth-divider"><span>or continue with</span></div>
          <button class="auth-btn-google" onclick="handleGoogleSignIn()">
            <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Sign in with Google
          </button>
          <p class="auth-switch">Don't have an account? <a href="#" onclick="showRegister()">Sign up</a></p>
        </div>

        <!-- Register Form -->
        <div id="registerForm" style="display:none">
          <div class="auth-field">
            <label>Full Name</label>
            <input type="text" id="regName" placeholder="Your full name">
          </div>
          <div class="auth-field">
            <label>Email Address</label>
            <input type="email" id="regEmail" placeholder="you@example.com">
          </div>
          <div class="auth-field">
            <label>Password (min 6 characters)</label>
            <input type="password" id="regPass" placeholder="Create a password">
          </div>
          <div class="auth-field">
            <label>I am a</label>
            <select id="regRole">
              <option value="student">Student</option>
              <option value="teacher">Teacher</option>
              <option value="admin">School Admin</option>
            </select>
          </div>
          <button class="auth-btn-primary" onclick="handleRegister()">
            <i class="fas fa-user-plus"></i> Create Account
          </button>
          <div class="auth-divider"><span>or continue with</span></div>
          <button class="auth-btn-google" onclick="handleGoogleSignIn()">
            <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Sign up with Google
          </button>
          <p class="auth-switch">Already have an account? <a href="#" onclick="showLogin()">Sign in</a></p>
        </div>
      </div>

      <div id="authError" class="auth-error" style="display:none"></div>
      <div id="authLoading" class="auth-loading" style="display:none">
        <div class="auth-spinner"></div>
        <span>Authenticating...</span>
      </div>
    </div>
  </div>

  <!-- Main App -->
  <div id="app">
    <div id="sov" onclick="togSB()"></div>
    <aside id="sb">
      <div class="sl">
        <div class="si">M</div>
        <div class="st">Maria<span>EduVault</span></div>
      </div>
      <nav class="sn" id="sidebarNav">
        <!-- Populated by JS -->
      </nav>
      <div class="sf">
        <div class="ni" onclick="nav('settings')"><i class="fas fa-cog"></i>Settings</div>
        <div class="ni" onclick="handleLogout()" style="color:var(--red)"><i class="fas fa-sign-out-alt"></i>Sign Out</div>
      </div>
    </aside>
    <div id="ma">
      <header id="tb">
        <button class="tbh" onclick="togSB()" aria-label="Menu"><i class="fas fa-bars"></i></button>
        <div class="tbs">
          <i class="fas fa-search tsi"></i>
          <input type="text" id="tsi" placeholder="Search subjects, resources, schools..." aria-label="Search" onfocus="nav('search')">
          <span class="kbd">Ctrl+K</span>
        </div>
        <div class="tbr">
          <div class="ss">
            <i class="fas fa-school" style="font-size:10px;color:var(--accL)"></i>
            <select id="ssSel" onchange="curSch=this.value;render()" aria-label="School"><option value="all">All Schools</option></select>
          </div>
          <div class="rt" id="roleToggle">
            <button class="rb act" data-r="student" onclick="setRole('student')">Student</button>
            <button class="rb" data-r="teacher" onclick="setRole('teacher')">Teacher</button>
            <button class="rb" data-r="admin" onclick="setRole('admin')">Admin</button>
          </div>
          <div class="ti" onclick="nav('history')" aria-label="Downloads"><i class="fas fa-download"></i><div class="nd" id="dlNotif" style="display:none"></div></div>
          <div class="ti" onclick="nav('settings')" aria-label="Profile"><i class="fas fa-bell"></i><div class="nd"></div></div>
          <div class="ta" id="topAvatar" title="Profile" onclick="nav('profile')">AK</div>
        </div>
      </header>
      <main id="ct"><div id="vc" class="vc"></div></main>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="tc" id="tC"></div>
  <!-- Modal Container -->
  <div id="mC"></div>

  <script src="app.js"></script>
</body>
</html>
